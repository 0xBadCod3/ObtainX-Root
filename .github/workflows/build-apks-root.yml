name: Build APKs (Root)

on:
  push:
    branches: [ main ]
    tags: ['v*']
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Release APKs
        run: |
          # Build universal APK
          flutter build apk --release --flavor normal
          
          # Build split APKs
          flutter build apk --release --flavor normal --split-per-abi

      - name: Organize Artifacts
        run: |
          mkdir -p build-output
          APK_DIR=build/app/outputs/flutter-apk
          cp "$APK_DIR/app-normal-release.apk" "build-output/ObtainX-universal-release.apk" || true
          cp "$APK_DIR/app-arm64-v8a-normal-release.apk" "build-output/ObtainX-arm64-v8a-release.apk" || true
          cp "$APK_DIR/app-armeabi-v7a-normal-release.apk" "build-output/ObtainX-armeabi-v7a-release.apk" || true
          cp "$APK_DIR/app-x86_64-normal-release.apk" "build-output/ObtainX-x86_64-release.apk" || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ObtainX-Release-APKs
          path: build-output/*.apk
